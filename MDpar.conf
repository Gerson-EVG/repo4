#############################################################
## JOB DESCRIPTION                                         ##
#############################################################

# Ibuprofene adsorption in MIL-101(Cr)-F and liquid water.
# 40 ibuprofene molecules
# contact: gerson.valenzuela@ufrontera.cl


#############################################################
## ADJUSTABLE PARAMETERS                                   ##
#############################################################

structure          system_MOF_WATER_IBU_BOX.psf
coordinates        system_MOF_WATER_IBU_BOX.pdb

set temperature    305
set outputname     MOF-WATER-IBU-BOX

firsttimestep      2000

mergeCrossterms 	no

#############################################################
## SIMULATION PARAMETERS                                   ##
#############################################################

# Input
paraTypeCharmm	    on
parameters          par_file_mil101_v2.inp     ;# MOF
parameters          par_file_water.inp  ;# water
parameters          par_file_ibuprofeno_S_O-_MMFF.par   ;# IBU
temperature         $temperature


# Force-Field Parameters
exclude             scaled1-4
1-4scaling          0.0000001
cutoff              12.0
switching           off
switchdist          10.0
pairlistdist        14.0


# Integrator Parameters
timestep            0.5  ;# 0.5fs/step
rigidBonds          water  ;# needed for water models
nonbondedFreq       2
fullElectFrequency  4  
stepspercycle       20


# Constant Temperature Control
langevin            on   ;# do langevin dynamics
langevinDamping     1.0    ;# damping coefficient (gamma) of 1/ps
langevinTemp        $temperature
langevinHydrogen    off  ;# don't couple langevin bath to hydrogens

# Constant Pressure Control (variable volume)
useGroupPressure      no ;# needed for rigidBonds
useFlexibleCell       no ;# para membranas
useConstantArea       no
langevinPiston        off ;# on/off
langevinPistonTarget  1.01325 ;#  in bar -> 1 atm
langevinPistonPeriod  100.0 ;# fs
langevinPistonDecay   20.0 ;# fs
langevinPistonTemp    $temperature

# Electrostatic Force Evaluation
MSM                 no ;# activar si no se usa condición de borde periódica
MSMGridSpacing      2.5  ;# very sensitive to performance, use this default
MSMxmin            -60 ;#-39.806 -5.0, se usa el radio de la esfera packmol +5 amtrs
MSMxmax             60 ;#39.9830 60.0
MSMymin            -60 ;#-39.758 -5.0 
MSMymax             60 ;# 39.983002
MSMzmin            -60 ;#-39.95500 -15.0 
MSMzmax             60 ;#39.61999
#cellOrigin          -0.01088815089315176 0.055260155349969864 -0.35438647866249084 ;# centro de la esfera

# PME (for full-system periodic electrostatics)
PME                 yes
PMEGridSpacing      1.0
#manual grid definition
#PMEGridSizeX        45
#PMEGridSizeY        45
#PMEGridSizeZ        45

# Output
outputName          $outputname
restartfreq         20000 
dcdfreq             10000 
outputEnergies      10000 
XSTfreq             10000


#############################################################
## EXTRA PARAMETERS                                        ##
#############################################################

fixedAtoms on
fixedAtomsForces on
fixedAtomsCol O

# Spherical boundary conditions
sphericalBC         off
sphericalBCcenter   -0.01088815089315176 0.055260155349969864 -0.35438647866249084 ;# centroide (VMD)
sphericalBCr1       55.0 ;#radio máximo del agua en (packmol + 5 amstr para asegurar)
sphericalBCk1       10 ;#fuerza del confinamiento
sphericalBCexp1     2 ;#potencial cuadrático

# Periodic boundary conditions
cellBasisVector1 76.544 0.0 0.0
cellBasisVector2 0.0 76.544 0.0
cellBasisVector3 0.0 0.0 76.544
cellOrigin 38.272 38.272 38.272
wrapAll on
wrapNearest on
wrapWater on

#############################################################
## EXECUTION SCRIPT                                        ##
#############################################################

# Minimization
 minimize            2000

# MD
 run 60000000     ;#30 nseg 

